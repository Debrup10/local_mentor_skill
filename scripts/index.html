<!DOCTYPE html><html><body><script>
    window['ai_edge_gallery_get_result'] = async (data) => {
        try {
            const jsonData = JSON.parse(data);
            
            // 1. Save to LocalStorage
            const logs = JSON.parse(localStorage.getItem('mentor_logs') || '[]');
            logs.unshift({
                time: new Date().toLocaleTimeString(),
                text: jsonData.log_text,
                type: jsonData.advice_type
            });
            localStorage.setItem('mentor_logs', JSON.stringify(logs.slice(0, 10)));

            // 2. Return the Webview instructions
            return JSON.stringify({
                result: "Journal updated and opened.",
                webview: {
                    url: "../assets/webview.html", // Relative to scripts/
                    aspectRatio: 1.2
                }
            });
        } catch (e) {
            return JSON.stringify({ error: `Logic Failed: ${e.message}` });
        }
    };
</script></body></html>
