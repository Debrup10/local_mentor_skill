<script>
  window.performAction = function(toolName, parametersJson) {
    if (toolName === 'render_mentor_nudge') {
      try {
        const data = JSON.parse(parametersJson);
        
        // FAIL-SAFE: If the model sent an "analysis" key instead of the schema
        const renderData = {
          state: data.emotional_state || "System Update",
          diagnosis: data.friction_diagnosis || data.analysis || "No diagnosis provided.",
          nudge: data.mentor_nudge || "Focus on the breath.",
          action: data.immediate_action || "Start the task now."
        };

        renderCard(renderData);
        return JSON.stringify({ status: "success" });
      } catch (e) {
        return JSON.stringify({ status: "error", message: e.message });
      }
    }
  };

  function renderCard(data) {
    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="mentor-card">
        <div class="header">System Diagnosis</div>
        <div class="state">${data.state}</div>
        <div class="diagnosis">${data.diagnosis}</div>
        <div class="nudge">💡 ${data.nudge}</div>
        <div class="action">⚡ ${data.action}</div>
      </div>
    `;
  }
</script>
