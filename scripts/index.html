<!DOCTYPE html><html><body><script>
    window['ai_edge_gallery_get_result'] = async (data) => {
        try {
            const input = JSON.parse(data);
            const history = JSON.parse(localStorage.getItem('mentor_history') || '[]');
            
            // Archive with the new pillar data
            history.unshift({
                timestamp: new Date().toLocaleString(),
                ...input
            });
            localStorage.setItem('mentor_history', JSON.stringify(history.slice(0, 20)));

            return JSON.stringify({
                result: "Mindset updated.",
                webview: { url: "../assets/webview.html", aspectRatio: 1.1 }
            });
        } catch (e) {
            return JSON.stringify({ error: e.message });
        }
    };
</script></body></html>
