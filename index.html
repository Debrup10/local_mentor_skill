<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; background: #1a1b26; color: #a9b1d6; padding: 15px; }
    .card { background: #24283b; border-radius: 8px; padding: 15px; border: 1px solid #414868; }
    h3 { margin-top: 0; color: #7aa2f7; border-bottom: 1px solid #414868; padding-bottom: 5px; }
    .log-list { margin-top: 10px; font-size: 0.9em; max-height: 200px; overflow-y: auto; }
    .log-item { border-bottom: 1px solid #292e42; padding: 5px 0; }
    .timestamp { color: #565f89; font-size: 0.8em; display: block; }
  </style>
</head>
<body>

  <div class="card">
    <h3>📓 Journal Logs</h3>
    <div id="log-display" class="log-list">
      <em>No entries yet. Start a check-in.</em>
    </div>
  </div>

  <script>
    // 1. The Bridge: This catches the data from Gemma
    window.performAction = function(toolName, parametersJson) {
      const data = JSON.parse(parametersJson);

      if (toolName === 'save_journal_log') {
        saveEntry(data.log_text);
        return JSON.stringify({ status: "success" });
      }
    };

    // 2. The Storage: Saving to the phone's local memory
    function saveEntry(text) {
      const logs = JSON.parse(localStorage.getItem('mentor_logs') || '[]');
      logs.push({
        time: new Date().toLocaleTimeString(),
        content: text
      });
      localStorage.setItem('mentor_logs', JSON.stringify(logs));
      renderLogs();
    }

    // 3. The UI: Showing the logs on the screen
    function renderLogs() {
      const logs = JSON.parse(localStorage.getItem('mentor_logs') || '[]');
      const display = document.getElementById('log-display');
      
      if (logs.length === 0) return;

      display.innerHTML = logs.reverse().map(log => `
        <div class="log-item">
          <span class="timestamp">${log.time}</span>
          ${log.content}
        </div>
      `).join('');
    }

    // Load existing logs when the UI pops up
    renderLogs();
  </script>
</body>
</html>
